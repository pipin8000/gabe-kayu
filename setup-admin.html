<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Setup Admin — Gabe International Hub</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:linear-gradient(135deg,#1a3a1a,#2d5a27);min-height:100vh;display:flex;align-items:center;justify-content:center;}
.card{background:#fff;border-radius:20px;padding:36px;width:100%;max-width:440px;box-shadow:0 20px 60px rgba(0,0,0,.3);margin:20px;}
.logo{text-align:center;margin-bottom:24px;}
.logo-icon{width:60px;height:60px;background:linear-gradient(135deg,#2d5a27,#3d7a35);border-radius:14px;display:inline-flex;align-items:center;justify-content:center;font-size:28px;margin-bottom:10px;}
h2{font-size:20px;font-weight:700;color:#1a3a1a;margin-bottom:4px;}
.sub{font-size:13px;color:#8a8680;margin-bottom:24px;}
.warn{background:#fff8e8;border:1px solid #f0c060;border-radius:10px;padding:12px 14px;font-size:12px;color:#7a5a10;margin-bottom:20px;}
.fg{margin-bottom:14px;}
.fg label{display:block;font-size:12px;font-weight:600;color:#5a5750;margin-bottom:4px;}
.fc{width:100%;padding:10px 12px;border:1.5px solid #d8d5cb;border-radius:8px;font-size:14px;font-family:inherit;}
.fc:focus{outline:none;border-color:#2d5a27;box-shadow:0 0 0 3px rgba(45,90,39,.1);}
.btn{width:100%;padding:12px;background:linear-gradient(135deg,#2d5a27,#3d7a35);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;}
.btn:hover{opacity:.9;}
.msg{margin-top:14px;padding:10px 14px;border-radius:8px;font-size:13px;display:none;}
.msg.success{background:#eaf3e8;color:#1e4219;border:1px solid #b8d9b4;display:block;}
.msg.error{background:#fceaea;color:#8b2020;border:1px solid #f5c2c2;display:block;}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">🔐</div>
    <h2>Setup Admin Pertama</h2>
    <p class="sub">Buat akun Admin untuk PT. Gabe International</p>
  </div>
  <div class="warn">⚠️ <b>Halaman ini hanya digunakan sekali</b> untuk membuat akun Admin pertama. Setelah selesai, hapus file ini dari GitHub!</div>
  <div class="fg"><label>Nama Admin</label><input type="text" class="fc" id="name" placeholder="Contoh: Pipin Manampin"></div>
  <div class="fg"><label>Email Admin</label><input type="email" class="fc" id="email" placeholder="pipin@gabeart.com"></div>
  <div class="fg"><label>Password</label><input type="password" class="fc" id="password" placeholder="Min. 6 karakter"></div>
  <button class="btn" onclick="createAdmin()">🚀 Buat Akun Admin</button>
  <div class="msg" id="msg"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCRqMpIYBBMZUVZx4v-C7kjMB6BUO6YcyA",
  authDomain: "gabe-international-hub.firebaseapp.com",
  projectId: "gabe-international-hub",
  storageBucket: "gabe-international-hub.firebasestorage.app",
  messagingSenderId: "115783216069",
  appId: "1:115783216069:web:62cfabf543b1fbb85bf9ac"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.createAdmin = async function() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const msgEl = document.getElementById('msg');
  msgEl.className = 'msg'; msgEl.style.display = 'none';

  if (!name || !email || !password) {
    msgEl.textContent = '⚠️ Semua field harus diisi!';
    msgEl.className = 'msg error'; return;
  }
  if (password.length < 6) {
    msgEl.textContent = '⚠️ Password minimal 6 karakter!';
    msgEl.className = 'msg error'; return;
  }

  try {
    const cred = await createUserWithEmailAndPassword(auth, email, password);
    await setDoc(doc(db, 'users', cred.user.uid), {
      name, email, role: 'admin', active: true,
      createdAt: serverTimestamp()
    });
    msgEl.innerHTML = '✅ <b>Akun Admin berhasil dibuat!</b><br>Email: ' + email + '<br><br>Sekarang:<br>1. Hapus file setup-admin.html dari GitHub<br>2. Buka <a href="index.html">index.html</a> untuk login';
    msgEl.className = 'msg success';
  } catch(e) {
    const msgs = {
      'auth/email-already-in-use': '❌ Email sudah digunakan!',
      'auth/invalid-email': '❌ Format email tidak valid!',
    };
    msgEl.textContent = msgs[e.code] || '❌ Error: ' + e.message;
    msgEl.className = 'msg error';
  }
}
</script>
</body>
</html>
